<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz js</title>
    <style>
        body {
    background: #f5f6fa;
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
}
.quiz {
    background: #fff;
    margin: 40px auto;
    padding: 30px 40px 20px 40px;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    max-width: 450px;
}
h1 {
    text-align: center;
    font-size: 24px;
    color: #273c75;
    margin-bottom: 20px;
}
fieldset {
    border: 1px solid #dcdde1;
    border-radius: 8px;
    margin-bottom: 18px;
    padding: 15px 10px 10px 10px;
    background: #f1f2f6;
}
legend {
    font-weight: bold;
    color: #353b48;
}
label {
    font-size: 16px;
    color: #353b48;
    margin-bottom: 8px;
    display: block;
    cursor: pointer;
}
input[type="radio"] {
    margin-right: 8px;
}
input[type="text"] {
    background: #f1f2f6;
    font-weight: bold;
    color: #192a56;
    text-align: center;
    border: 1px solid #dcdde1;
    border-radius: 5px;
    font-size: 16px;
    padding: 6px 0;
    width: 60px;
    margin-left: 8px;
}
.btn {
    padding: 10px 22px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    margin: 10px 0 0 0;
    cursor: pointer;
    background: #44bd32;
    color: #fff;
    transition: background 0.2s;
    display: block;
    width: 100%;
}
.btn:hover {
    background: #218c1b;
}
    </style>
</head>
<body>
    <div class="quiz">
        <h1>Bienvenue sur le Quiz</h1>
      
    <fieldset>
        <legend>Quel est le plus grand océan du monde ?</legend><br>
        <label>
            <input type="radio" name="q0" value="Atlantique"> Atlantique
        </label>
          <label>
            <input type="radio" name="q0" value="Indien"> Indien
        </label>
          <label>
            <input type="radio" name="q0" value="Arctique"> Arctique
        </label>
          <label>
            <input type="radio" name="q0" value="Pacifique"> Pacifique
        </label>
    </fieldset><br>
      <fieldset>
        <legend>Qui a écrit Les Misérables ?</legend><br>
        <label>
            <input type="radio" name="q1" value="Victor Hugo"> Victor Hugo
        </label>
          <label>
            <input type="radio" name="q1" value="Emile zola"> Emile zola
        </label>
          <label>
            <input type="radio" name="q1" value="Molière"> Molière
        </label><br>
          <label>
            <input type="radio" name="q1" value="Albert Canus"> Albert Canus
        </label>
    </fieldset><br>
      <fieldset>
        <legend>Quel langage de programmation est souvent utilisé pour créer des pages web interactives ?</legend><br>
        <label>
            <input type="radio" name="q2" value="Python"> Python
        </label>
          <label>
            <input type="radio" name="q2" value="Javascript"> Javascript
        </label>
          <label>
            <input type="radio" name="q2" value="C++"> C++
        </label>
          <label>
            <input type="radio" name="q2" value="Java"> Java
        </label>
    </fieldset><br>
      <fieldset>
        <legend>Quelle est la planète la plus proche du Soleil  ?</legend>
        <label><br>
            <input type="radio" name="q3" value="Mercure"> Mercure
        </label>
          <label>
            <input type="radio" name="q3" value="Venus"> Vénus
        </label>
          <label>
            <input type="radio" name="q3" value="Terre"> Terre
        </label>
          <label>
            <input type="radio" name="q3" value="Mars"> Mars
        </label>
    </fieldset><br>
      <fieldset>
        <legend>Combien y a-t-il de continents sur Terre ?</legend>
        <label><br>
            <input type="radio" name="q4" value="5"> 5
        </label>
          <label>
            <input type="radio" name="q4" value="6"> 6
        </label>
          <label>
            <input type="radio" name="q4" value="7"> 7
        </label><br>
          <label>
            <input type="radio" name="q4" value="8"> 8
        </label>
    </fieldset><br>
    <button class="btn">Vérifier</button><br><br> <label>
          score 👉 <input type="text" id="text" disabled>
        </label>

    </div>
   
    <script>
        // questions
        let zscore = document.getElementById("text")
        let zbtn = document.querySelector(".btn")
        const questions = [
            {
                question: "Quel est le plus grand océan du monde ?",
                reponse: "Pacifique"
            },
            {
                question: "Qui a écrit Les Misérables ?",
                reponse: "Victor Hugo"
            },
            {
                question: "Quel langage de programmation est souvent utilisé pour créer des pages web interactives ?",
                reponse: "Javascript"
            },
            {
                question: "Quelle est la planète la plus proche du Soleil  ?",
                reponse: "Mercure"
            },
            {
                question: "Combien y a-t-il de continents sur Terre ?",
                reponse: "7"
            }
        ];

        zbtn.addEventListener("click", function(e) {
            e.preventDefault();
            let score = 0;
            for (let i = 0; i < questions.length; i++) {
                let radios = document.getElementsByName("q" + i);
                for (let radio of radios) {
                    if (radio.checked && radio.value === questions[i].reponse) {
                        score++;
                    }
                }
            }
            zscore.value = score + " / " + questions.length; 
        })
    </script>
</body>
</html>
